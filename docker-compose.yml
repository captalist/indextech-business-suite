services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: suite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suite_secret_change_me}
      POSTGRES_DB: indextech_suite
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U suite -d indextech_suite']
      interval: 5s
      timeout: 5s
      retries: 10

  indextech-suite:
    build: .
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: postgresql://suite:${POSTGRES_PASSWORD:-suite_secret_change_me}@db:5432/indextech_suite
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
